# CityPulse — automatikus AI moderátor
# Óránként lekéri a pending felhasználói beküldéseket (max 50/futás),
# LLM-mel minősíti, és approved/rejected státuszra frissíti őket.

name: AI Moderator

on:
  schedule:
    - cron: "15 * * * *" # óránként, xx:15-kor (UTC)
  workflow_dispatch:

jobs:
  moderate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Függőségek telepítése
        run: pip install -r scripts/requirements.txt

      - name: Moderátor futtatása
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/moderator.py
